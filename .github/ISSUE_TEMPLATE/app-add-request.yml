name: Add app request
description: Request adding a new app to the list
title: "[APP] "
labels: ["app request"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide complete app details.

        Source URL priority:
        1) FOSS app: GitHub/GitLab/Codeberg URL
        2) Otherwise: Play Store URL
        3) Website/other links only as fallback

  - type: input
    id: app_name
    attributes:
      label: App name
      placeholder: Example App
    validations:
      required: true

  - type: dropdown
    id: app_type
    attributes:
      label: App type
      options:
        - FOSS
        - Proprietary
    validations:
      required: true

  - type: input
    id: source_url
    attributes:
      label: Primary source URL
      description: GitHub/GitLab/Codeberg for FOSS, otherwise Play Store
      placeholder: https://github.com/owner/repo
    validations:
      required: true

  - type: textarea
    id: tags
    attributes:
      label: Tags (explicitly list all applicable)
      description: Include relevant tags such as MD3E, MDY, MD, MY, FOSS, FORK, MOD, 💰, 🪦
      placeholder: MDY, FOSS
    validations:
      required: true

  - type: textarea
    id: section
    attributes:
      label: Suggested section/subsection
      placeholder: Social & Communication > Pixelfed
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I followed source URL priority and listed all applicable tags.
          required: true
